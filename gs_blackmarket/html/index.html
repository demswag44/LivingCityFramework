<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="hidden">
        <div class="market-shell">
            <aside class="sidebar">
                <div class="brand">
                    <span class="brand-kicker">Living City</span>
                    <strong>BLACK MARKET</strong>
                </div>

                <button class="category-btn active" data-category="all">All Items</button>
                <button class="category-btn" data-category="weapon">Weapons</button>
                <button class="category-btn" data-category="ammo">Ammo</button>
                <button class="category-btn" data-category="tool">Tools</button>

                <div class="sidebar-note">
                    Cash only.<br>
                    No names. No refunds.
                </div>
            </aside>

            <main class="content">
                <header class="market-header">
                    <p class="eyebrow">Underground Dealer</p>
                    <h1 id="marketTitle">Black Market</h1>
                    <p id="marketSubtitle">No refunds. No questions.</p>
                </header>

                <section id="itemGrid" class="item-grid"></section>
            </main>

            <aside class="cart-panel">
                <div class="cart-header">
                    <h2>Cart</h2>
                    <p>Review your order.</p>
                    <div id="restockTimer" class="restock-timer">Restock: --:--</div>
                </div>

                <div id="cartItems" class="cart-items"></div>

                <div class="cart-total-row">
                    <span>Total</span>
                    <strong id="cartTotal">$0</strong>
                </div>

                <button id="purchaseBtn" class="primary-btn">Complete Purchase</button>
                <button id="clearCartBtn" class="secondary-btn">Clear Cart</button>
                <button id="leaveBtn" class="danger-btn">Leave</button>
            </aside>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
