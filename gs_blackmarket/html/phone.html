<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="shadowmarket.css">
</head>
<body>
    <div id="shadowMarketApp" class="shadow-phone">
        <div class="shadow-phone-shell">
            <div class="calculator-mode" id="calculatorMode">
                <div class="phone-topline">
                    <span id="shadowVisibleName">Calculator</span>
                    <button id="shadowCloseBtn" class="shadow-close" aria-label="Close">x</button>
                </div>
                <div id="calculatorDisplay" class="calculator-display">0</div>
                <div class="calculator-grid">
                    <button data-calc="7">7</button>
                    <button data-calc="8">8</button>
                    <button data-calc="9">9</button>
                    <button data-calc="clear">C</button>
                    <button data-calc="4">4</button>
                    <button data-calc="5">5</button>
                    <button data-calc="6">6</button>
                    <button data-calc="back">DEL</button>
                    <button data-calc="1">1</button>
                    <button data-calc="2">2</button>
                    <button data-calc="3">3</button>
                    <button data-calc="equals" class="equals">=</button>
                    <button data-calc="0" class="zero">0</button>
                    <button data-calc=".">.</button>
                </div>
                <div id="calculatorStatus" class="calculator-status"></div>
            </div>
            <div class="shadow-mode hidden" id="shadowMode">
                <div class="phone-topline">
                    <span id="shadowHiddenName">ShadowMarket</span>
                    <button id="shadowExitBtn" class="shadow-close" aria-label="Close">x</button>
                </div>
                <div class="shadow-header">
                    <h1>ShadowMarket</h1>
                    <p>BackChannel Access Confirmed</p>
                </div>
                <div class="shadow-status">
                    <span id="shadowRep">Dealer Rep: 0</span>
                    <span id="shadowDealer">Active Dealer: unknown</span>
                    <span>Status: Online</span>
                </div>
                <div class="shadow-tile-grid" id="shadowDashboard">
                    <button class="shadow-tile" id="shadowBuyBtn"><strong>Buy</strong><span>Browse live stock</span></button>
                    <button class="shadow-tile" id="shadowSellBtn"><strong>Sell</strong><span>Vehicle Offers</span></button>
                    <button class="shadow-tile" id="shadowPickupBtn"><strong>Pickup Orders</strong><span>Pending drops</span></button>
                    <div class="shadow-tile"><strong>Crew Finder</strong><span>Coming Soon</span></div>
                    <div class="shadow-tile"><strong>Heist Board</strong><span>Coming Soon</span></div>
                    <div class="shadow-tile"><strong>Contracts</strong><span>Coming Soon</span></div>
                </div>
                <div id="shadowContent" class="shadow-content hidden"></div>
                <div id="shadowCartOverlay" class="shadow-cart-overlay hidden"></div>
                <aside id="shadowCartPanel" class="shadow-cart-panel hidden">
                    <div class="shadow-cart-header">
                        <div>
                            <p class="shadow-kicker">Order Cart</p>
                            <h2>Pending Order</h2>
                        </div>
                        <button id="shadowCartCloseBtn" class="shadow-icon-btn" aria-label="Close cart">x</button>
                    </div>
                    <div id="shadowCartItems" class="shadow-cart-items"></div>
                    <div class="shadow-cart-footer">
                        <div class="shadow-cart-total-row">
                            <span>Total</span>
                            <strong id="shadowCartTotal">$0</strong>
                        </div>
                        <button id="shadowPlaceOrderBtn" class="shadow-primary-btn">Place Order</button>
                        <button id="shadowClearCartBtn" class="shadow-secondary-btn">Clear Cart</button>
                    </div>
                </aside>
                <button id="shadowWipeBtn" class="shadow-wipe">Wipe App</button>
                <div id="shadowStatus" class="shadow-message"></div>
            </div>
        </div>
    </div>
    <script src="shadowmarket.js"></script>
</body>
</html>
